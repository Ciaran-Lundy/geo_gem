<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iML1515 — Metabolic Network</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/escher@1.7.3/dist/escher.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 1rem 2rem; border-bottom: 1px solid #1e2533; flex-shrink: 0; display: flex; align-items: center; gap: 1.5rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.78rem; color: #64748b; }

    .tab-bar { display: flex; border: 1px solid #2d3748; border-radius: 5px; overflow: hidden; flex-shrink: 0; }
    .tab-bar button {
      background: #1e2533; border: none; color: #94a3b8;
      padding: 0.35rem 1.1rem; font-size: 0.78rem; cursor: pointer;
      border-right: 1px solid #2d3748;
    }
    .tab-bar button:last-child { border-right: none; }
    .tab-bar button.active { background: #3b82f6; color: #fff; font-weight: 600; }

    #controls {
      display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;
      padding: 0.75rem 2rem; background: #131720;
      border-bottom: 1px solid #1e2533; flex-shrink: 0;
    }
    .ctrl { display: flex; flex-direction: column; gap: 0.25rem; }
    .ctrl label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
    select {
      background: #1e2533; border: 1px solid #2d3748; border-radius: 4px;
      color: #e2e8f0; padding: 0.3rem 0.55rem; font-size: 0.8rem; min-width: 200px;
    }
    .range-wrap { display: flex; align-items: center; gap: 0.5rem; }
    input[type=range] { accent-color: #3b82f6; width: 120px; }
    .range-val { font-size: 0.82rem; color: #60a5fa; font-weight: 600; min-width: 2.5ch; }

    #legend { display: flex; gap: 0.9rem; flex-wrap: wrap; align-items: center; }
    .leg-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.73rem; color: #94a3b8; }
    .leg-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    #flux-legend { display: none; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: #94a3b8; }
    #flux-legend.visible { display: flex; }
    #flux-grad { width: 100px; height: 9px; border-radius: 3px; background: linear-gradient(to right, #ef4444, #475569, #3b82f6); }

    #chart {
      flex: 1; display: flex; justify-content: center; align-items: center;
      overflow: hidden; position: relative;
    }
    #chart svg { overflow: visible; }

    /* Chord */
    .group path { cursor: pointer; transition: opacity 0.15s; }
    .ribbons path { transition: opacity 0.15s; }
    .ribbons path:hover { opacity: 1 !important; }

    /* Escher container — white background matches the official Escher viewer */
    #escher-container { width: 100%; height: 100%; position: absolute; inset: 0; background: #fff; overflow: hidden; }

    #tooltip {
      position: fixed; pointer-events: none;
      background: #1a2030; border: 1px solid #2d3748; border-radius: 6px;
      padding: 0.55rem 0.8rem; font-size: 0.77rem; line-height: 1.65;
      max-width: 280px; display: none; z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #tooltip strong { color: #60a5fa; }
    #tooltip .sub  { color: #94a3b8; margin-top: 0.15rem; font-size: 0.73rem; }
    #tooltip .flux-up   { color: #ef4444; }
    #tooltip .flux-down { color: #3b82f6; }
    #tooltip .flux-flat { color: #64748b; }

    #status { color: #64748b; font-size: 0.9rem; }
    #keio-badge {
      font-size: 0.69rem; padding: 0.12rem 0.45rem; border-radius: 3px;
      background: #1e2533; color: #64748b; border: 1px solid #2d3748;
    }
    #keio-badge.loaded { color: #10b981; border-color: #10b981; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>iML1515 E. coli — Metabolic Network</h1>
    <p>Flux perturbation from Keio gene-knockout fitness data vs glucose baseline.</p>
  </div>
  <div class="tab-bar">
    <button class="tab active" data-view="chord">Chord Diagram</button>
    <button class="tab"        data-view="escher">Escher Flux Map</button>
    <button class="tab"        data-view="alluvial">Omics Flow</button>
  </div>
</header>

<div id="controls">
  <!-- Chord-only controls -->
  <div class="ctrl" id="ctrl-subsystem">
    <label>Subsystem</label>
    <select id="sel-subsystem"></select>
  </div>
  <div class="ctrl" id="ctrl-topN">
    <label>Top metabolites</label>
    <div class="range-wrap">
      <input type="range" id="rng-topN" min="4" max="80" value="30">
      <span class="range-val" id="val-topN">30</span>
    </div>
  </div>
  <div class="ctrl" id="ctrl-compartment">
    <label>Compartment</label>
    <select id="sel-compartment"><option value="">All</option></select>
  </div>
  <!-- Escher-only controls -->
  <div class="ctrl" id="ctrl-escher-map" style="display:none">
    <label>Pathway map (iJO1366)</label>
    <select id="sel-escher-map"></select>
  </div>
  <div class="ctrl" id="ctrl-escher-layer" style="display:none">
    <label>Omics layer</label>
    <select id="sel-escher-layer">
      <option value="fluxome">Fluxome — reaction fluxes</option>
      <option value="gene">Gene Activity — GPR-weighted</option>
      <option value="metabolome">Metabolome — metabolite nodes</option>
    </select>
  </div>
  <!-- Shared controls -->
  <div class="ctrl" id="ctrl-condition" style="display:none">
    <label>Keio condition vs glucose</label>
    <select id="sel-condition"></select>
  </div>
  <div class="ctrl" id="ctrl-threshold" style="display:none">
    <label>Flux threshold</label>
    <div class="range-wrap">
      <input type="range" id="rng-threshold" min="1" max="20" value="5">
      <span class="range-val" id="val-threshold">0.5</span>
    </div>
  </div>
  <div id="flux-legend">
    <span>more active</span><div id="flux-grad"></div><span>less active</span>
  </div>
  <span id="keio-badge">Keio: loading…</span>
  <div id="legend"></div>
</div>

<div id="chart"><div id="status">Loading data…</div></div>
<div id="tooltip"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const COMP_NAMES  = { c:'Cytoplasm', e:'Extracellular', p:'Periplasm', m:'Mitochondria', x:'Peroxisome', n:'Nucleus' };
const COMP_COLORS = { c:'#3b82f6', e:'#f59e0b', p:'#10b981', m:'#8b5cf6', x:'#ef4444', n:'#ec4899' };
const FALLBACK    = '#64748b';

// ── Geo knowledge-graph ───────────────────────────────────────────────────────
const GEO_API   = 'https://testnet-api.geobrowser.io/graphql';
const GEO_SPACE = 'aec359295ff90d00aea6696f0ddb1bbc';

// Ontology IDs — UUIDv5(name, namespace=6ba7b810-9dad-11d1-80b4-00c04fd430c8), dashes removed
const GEO_TYPES = {
  METABOLITE : '8e7980fb4f3c5632ab22c5818534b167',
  REACTION   : '2eceff2579105d129e747cc86401105c',
};
const GEO_PROPS = {
  BIGG_ID           : '23c0bfeeed0e5035b4129152bbb3dc6a',
  FORMULA           : 'b8e367155aca576089fa06c408bef7de',
  CHARGE            : '68a87cf7359f5032b246a2792ed12e33',
  COMPARTMENT_CODE  : 'e3e4d05ee4a1535ba2973869fa2cb732',
  LOWER_BOUND       : 'b3adc5f5edc651a5a815f9edc8b546e8',
  UPPER_BOUND       : '2f61be01ee135b66a9bcb50770f93631',
  GENE_REACTION_RULE: '812b254fdc64562ca691c4b95219c21b',
  STOICHIOMETRY     : '1de24f5fdf9e5b389c6c9749d1220072',
  SUBSYSTEM_NAME    : 'e93af5ca42ff570d8b5efa841c34cb5c',
};
const GEO_RELS = {
  SUBSTRATE_OF : '0362404c4abd5404b920cec46da874b9',
  PRODUCT_OF   : '9207b44c580f5201bc50fcaf5fa84aa7',
  PART_OF      : '3d369d3fee3a5b77b768dc62d5fa191a',
};

async function geoGql(query) {
  const r = await fetch(GEO_API, {
    method : 'POST',
    headers: { 'content-type': 'application/json' },
    body   : JSON.stringify({ query }),
  });
  if (!r.ok) throw new Error(`Geo API HTTP ${r.status}`);
  const { data, errors } = await r.json();
  if (errors?.length) throw new Error(errors.map(e => e.message).join('; '));
  return data;
}

// Fetch all entities of a given type using cursor-based pagination.
// The API caps both `first` and `offset` at 1000, so offset pagination breaks
// for large collections (reactions: 2712+). Cursor pagination has no such limit.
async function fetchGeoPages(typeId, fields, batchSize = 500) {
  const connQuery = (after) =>
    geoGql(`{ entitiesConnection(spaceId:"${GEO_SPACE}", typeId:"${typeId}", first:${batchSize}${after ? `, after:"${after}"` : ''}) {
      totalCount
      pageInfo { hasNextPage endCursor }
      edges { node { ${fields} } }
    } }`);

  const firstPage = await connQuery(null);
  const total = firstPage.entitiesConnection.totalCount;
  const entities = firstPage.entitiesConnection.edges.map(e => e.node);
  let { hasNextPage, endCursor } = firstPage.entitiesConnection.pageInfo;

  while (hasNextPage) {
    const page = await connQuery(endCursor);
    entities.push(...page.entitiesConnection.edges.map(e => e.node));
    ({ hasNextPage, endCursor } = page.entitiesConnection.pageInfo);
  }

  return { total, entities };
}

function setStatus(msg) {
  const el = document.getElementById('status');
  if (el) el.textContent = msg;
}

async function loadGemFromGeo() {
  const CACHE_KEY = `geo_gem_v1_${GEO_SPACE}`;
  try {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) return JSON.parse(cached);
  } catch (_) {}

  // ── 1. Metabolites (need compartment via PART_OF → Compartment entity) ────
  setStatus('Fetching metabolites from Geo…');
  const metFields = `id name
    valuesList { propertyId text float }
    relationsList(first:3) {
      typeId toEntity { valuesList { propertyId text } }
    }`;
  const { total: nMets, entities: rawMets } =
    await fetchGeoPages(GEO_TYPES.METABOLITE, metFields);
  setStatus(`${rawMets.length}/${nMets} metabolites — fetching reactions…`);

  // entityId → BiGG ID map — needed to reconstruct stoichiometry on reactions
  const entityToMetBigg = {};
  const metabolites = rawMets.map(e => {
    const vals   = Object.fromEntries(e.valuesList.map(v => [v.propertyId, v.text ?? v.float]));
    const partOf = e.relationsList.find(r => r.typeId === GEO_RELS.PART_OF);
    const cVals  = Object.fromEntries(
      (partOf?.toEntity?.valuesList ?? []).map(v => [v.propertyId, v.text ?? v.float])
    );
    const biggId = vals[GEO_PROPS.BIGG_ID] ?? e.name;
    entityToMetBigg[e.id] = biggId;
    return {
      id         : biggId,
      name       : e.name,
      compartment: cVals[GEO_PROPS.COMPARTMENT_CODE] ?? 'c',
      formula    : vals[GEO_PROPS.FORMULA] ?? '',
      charge     : vals[GEO_PROPS.CHARGE] ?? 0,
    };
  });

  // ── 2. Reactions (stoichiometry lives on the relation entity's values) ────
  // backlinksList gives SUBSTRATE_OF / PRODUCT_OF relations from metabolites;
  // each relation entity carries the STOICHIOMETRY float property.
  const rxnFields = `id name
    valuesList { propertyId text float }
    backlinksList(first:200) {
      typeId fromEntityId
      entity { valuesList { propertyId float } }
    }`;
  const { total: nRxns, entities: rawRxns } =
    await fetchGeoPages(GEO_TYPES.REACTION, rxnFields);
  setStatus(`${rawRxns.length}/${nRxns} reactions — assembling model…`);

  const reactions = rawRxns.map(e => {
    const vals = Object.fromEntries(e.valuesList.map(v => [v.propertyId, v.text ?? v.float]));
    const mets = {};
    for (const bl of e.backlinksList) {
      if (bl.typeId !== GEO_RELS.SUBSTRATE_OF && bl.typeId !== GEO_RELS.PRODUCT_OF) continue;
      const bigg = entityToMetBigg[bl.fromEntityId];
      if (!bigg) continue;
      const s = bl.entity?.valuesList?.find(v => v.propertyId === GEO_PROPS.STOICHIOMETRY)?.float ?? 1;
      mets[bigg] = bl.typeId === GEO_RELS.SUBSTRATE_OF ? -s : s;
    }
    return {
      id                : vals[GEO_PROPS.BIGG_ID] ?? e.name,
      name              : e.name,
      subsystem         : vals[GEO_PROPS.SUBSYSTEM_NAME] ?? '',
      lower_bound       : vals[GEO_PROPS.LOWER_BOUND] ?? 0,
      upper_bound       : vals[GEO_PROPS.UPPER_BOUND] ?? 1000,
      gene_reaction_rule: vals[GEO_PROPS.GENE_REACTION_RULE] ?? '',
      metabolites       : mets,
    };
  });

  const gem = { metabolites, reactions, genes: [] };
  try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(gem)); } catch (_) {}
  return gem;
}

const ESCHER_MAPS = [
  { key: 'central_metabolism',          label: 'Central Metabolism'              },
  { key: 'fatty_acid_beta_oxidation',   label: 'Fatty Acid β-Oxidation'          },
  { key: 'fatty_acid_biosynthesis',     label: 'Fatty Acid Biosynthesis'         },
  { key: 'nucleotide_metabolism',       label: 'Nucleotide Metabolism'           },
  { key: 'nucleotide_histidine_biosyn', label: 'Nucleotide & Histidine Biosyn.'  },
];

// ── State ─────────────────────────────────────────────────────────────────────
let gem          = null;
let keio         = null;
let activeView   = 'chord';
let escherBuilder = null;
const escherMapCache = {};

// ── Flux helpers ──────────────────────────────────────────────────────────────
const fluxThreshold  = () => +document.getElementById('rng-threshold').value / 10;
const activeCondition = () => document.getElementById('sel-condition')?.value ?? '__none__';
const inFluxMode     = () => keio && activeCondition() !== '__none__';

function rxnDelta(rxnId) {
  if (!inFluxMode()) return null;
  const s = keio.reaction_scores[rxnId];
  if (!s) return null;
  const sc = s[activeCondition()], sb = s[keio.baseline];
  return (sc != null && sb != null) ? sc - sb : null;
}

function fluxColor(delta) {
  if (delta == null || isNaN(delta)) return FALLBACK;
  const t = Math.min(Math.abs(delta) / 2, 1);
  if (Math.abs(delta) < fluxThreshold()) return '#475569';
  return delta < 0
    ? d3.interpolateRgb('#475569', '#ef4444')(t)
    : d3.interpolateRgb('#475569', '#3b82f6')(t);
}

function ribbonDelta(rxnIds) {
  const ds = rxnIds.map(rxnDelta).filter(d => d != null);
  return ds.length ? ds.reduce((a, b) => a + b) / ds.length : null;
}

function fluxLabel(delta) {
  if (!inFluxMode()) return '';
  if (delta == null) return '<span class="flux-flat">no Keio data</span>';
  const [cls, txt] = delta < -fluxThreshold()
    ? ['flux-up',   `▲ more active (Δ ${delta.toFixed(2)})`]
    : delta > fluxThreshold()
    ? ['flux-down', `▼ less active (Δ +${delta.toFixed(2)})`]
    : ['flux-flat', `≈ unchanged (Δ ${delta.toFixed(2)})`];
  return `<span class="${cls}">${txt}</span>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    gem = await loadGemFromGeo();
  } catch (e) {
    document.getElementById('status').textContent =
      `Could not load model from Geo: ${e.message}`;
    return;
  }

  // ── Pre-compute index structures for derived omics layers ──
  // gene → [rxn ids] and rxn → [gene ids], both via GPR strings
  gem._geneToRxns = {};
  gem._rxnToGenes = {};
  gem._metToRxns  = {};
  const geneRe = /b\d+/g;
  for (const rxn of gem.reactions) {
    const genes = [...(rxn.gene_reaction_rule || '').matchAll(geneRe)].map(m => m[0]);
    gem._rxnToGenes[rxn.id] = genes;
    for (const g of genes)
      (gem._geneToRxns[g] = gem._geneToRxns[g] ?? []).push(rxn.id);
    for (const metId of Object.keys(rxn.metabolites ?? {}))
      (gem._metToRxns[metId] = gem._metToRxns[metId] ?? []).push(rxn.id);
  }

  // Keio (optional)
  const badge = document.getElementById('keio-badge');
  try {
    keio = await fetch('./data/keio_perturbations.json').then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
    badge.textContent = `Keio: ${keio.conditions.length} conditions`;
    badge.classList.add('loaded');
    buildConditionDropdown();
    document.getElementById('ctrl-condition').style.display = '';
    document.getElementById('ctrl-threshold').style.display = '';
  } catch (_) { badge.textContent = 'Keio: not loaded'; }

  // Subsystem dropdown
  const subsystems = [...new Set(gem.reactions.map(r => r.subsystem).filter(Boolean))].sort();
  const selSys = document.getElementById('sel-subsystem');
  for (const s of subsystems) {
    const o = document.createElement('option');
    o.value = o.textContent = s; selSys.appendChild(o);
  }
  selSys.value = subsystems.find(s => /glycolysis/i.test(s)) ?? subsystems[0];

  // Compartment dropdown
  const comps = [...new Set(gem.metabolites.map(m => m.compartment))].sort();
  const selComp = document.getElementById('sel-compartment');
  for (const c of comps) {
    const o = document.createElement('option');
    o.value = c; o.textContent = COMP_NAMES[c] ?? c; selComp.appendChild(o);
  }

  // Escher map dropdown
  const selEscher = document.getElementById('sel-escher-map');
  for (const m of ESCHER_MAPS) {
    const o = document.createElement('option');
    o.value = m.key; o.textContent = m.label; selEscher.appendChild(o);
  }

  // Compartment legend
  const legend = document.getElementById('legend');
  for (const c of comps) legend.insertAdjacentHTML('beforeend', `
    <div class="leg-item">
      <div class="leg-swatch" style="background:${COMP_COLORS[c]??FALLBACK}"></div>
      ${COMP_NAMES[c]??c}
    </div>`);

  // Wire controls
  selSys.addEventListener('change', render);
  selComp.addEventListener('change', render);
  selEscher.addEventListener('change', render);
  document.getElementById('sel-escher-layer').addEventListener('change', () => {
    if (activeView === 'escher' && escherBuilder) updateEscherData(); else render();
  });
  document.getElementById('rng-topN').addEventListener('input', e => {
    document.getElementById('val-topN').textContent = e.target.value; render();
  });
  document.getElementById('rng-threshold').addEventListener('input', e => {
    document.getElementById('val-threshold').textContent = (+e.target.value/10).toFixed(1);
    if (activeView === 'escher' && escherBuilder) updateEscherData(); else render();
  });
  document.getElementById('sel-condition')?.addEventListener('change', () => {
    document.getElementById('flux-legend').classList.toggle('visible', inFluxMode());
    if (activeView === 'escher' && escherBuilder) updateEscherData(); else render();
  });
  document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeView = btn.dataset.view;
    syncControls();
    render();
  }));
  window.addEventListener('resize', render);

  syncControls();
  render();
}

function syncControls() {
  const isChord    = activeView === 'chord';
  const isEscher   = activeView === 'escher';
  const isAlluvial = activeView === 'alluvial';
  document.getElementById('ctrl-subsystem').style.display    = isChord    ? ''     : 'none';
  document.getElementById('ctrl-topN').style.display         = isChord    ? ''     : 'none';
  document.getElementById('ctrl-compartment').style.display  = isChord    ? ''     : 'none';
  document.getElementById('ctrl-escher-map').style.display   = isEscher   ? ''     : 'none';
  document.getElementById('ctrl-escher-layer').style.display = isEscher   ? ''     : 'none';
  document.getElementById('legend').style.display            = isChord    ? ''     : 'none';
}

function buildConditionDropdown() {
  const sel = document.getElementById('sel-condition');
  sel.innerHTML = '';
  const none = document.createElement('option');
  none.value = '__none__'; none.textContent = '— compartment colours —';
  sel.appendChild(none);
  const groups = {};
  for (const c of keio.conditions) (groups[c.group] = groups[c.group] ?? []).push(c);
  const order = ['carbon source','nitrogen source','sulfur source','stress'];
  const sorted = [...order.filter(g => groups[g]), ...Object.keys(groups).filter(g => !order.includes(g))];
  for (const g of sorted) {
    const og = document.createElement('optgroup');
    og.label = g.charAt(0).toUpperCase() + g.slice(1);
    for (const c of groups[g]) {
      const o = document.createElement('option');
      o.value = c.key;
      o.textContent = c.key === keio.baseline ? `${c.label} ★` : c.label;
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
}

// ── Render dispatcher ─────────────────────────────────────────────────────────
function render() {
  document.getElementById('chart').innerHTML = '';
  escherBuilder = null;
  if      (activeView === 'chord')    renderChord();
  else if (activeView === 'escher')   renderEscher();
  else if (activeView === 'alluvial') renderAlluvial();
}

// ── Chord Diagram ─────────────────────────────────────────────────────────────
function renderChord() {
  const subsystem  = document.getElementById('sel-subsystem').value;
  const topN       = +document.getElementById('rng-topN').value;
  const compFilter = document.getElementById('sel-compartment').value;
  const fluxMode   = inFluxMode();
  const chart      = document.getElementById('chart');

  const reactions = gem.reactions.filter(r => r.subsystem === subsystem);
  const metLookup = Object.fromEntries(
    gem.metabolites.filter(m => !compFilter || m.compartment === compFilter).map(m => [m.id, m])
  );
  const connectivity = {};
  for (const rxn of reactions)
    for (const id of Object.keys(rxn.metabolites))
      if (id in metLookup) connectivity[id] = (connectivity[id] ?? 0) + 1;

  const topMets = Object.keys(connectivity).sort((a,b)=>connectivity[b]-connectivity[a]).slice(0,topN);
  if (topMets.length < 2) { chart.innerHTML = '<div id="status">No data for this selection.</div>'; return; }

  const idx = Object.fromEntries(topMets.map((id,i) => [id,i]));
  const N   = topMets.length;
  const matrix   = Array.from({length:N}, () => new Array(N).fill(0));
  const rxnNames = {}, rxnIds = {};

  for (const rxn of reactions) {
    const entries = Object.entries(rxn.metabolites);
    const subs  = entries.filter(([id,s]) => s<0 && id in idx).map(([id])=>id);
    const prods = entries.filter(([id,s]) => s>0 && id in idx).map(([id])=>id);
    for (const s of subs) for (const p of prods) {
      if (s===p) continue;
      matrix[idx[s]][idx[p]] += 1;
      const key = `${idx[s]}-${idx[p]}`;
      (rxnNames[key] = rxnNames[key]??[]).push(rxn.name||rxn.id);
      (rxnIds[key]   = rxnIds[key]  ??[]).push(rxn.id);
    }
  }

  const size   = Math.min(chart.clientWidth, chart.clientHeight, 760) - 20;
  const outerR = size/2 - 40, innerR = outerR - 18;
  const svg    = d3.create('svg').attr('width', size).attr('height', size);
  const g      = svg.append('g').attr('transform', `translate(${size/2},${size/2})`);
  const chords = d3.chord().padAngle(0.03).sortSubgroups(d3.descending)(matrix);
  const arc    = d3.arc().innerRadius(innerR).outerRadius(outerR);
  const ribbon = d3.ribbon().radius(innerR - 1);
  const mets   = topMets.map(id => metLookup[id]);
  const compColor = d => COMP_COLORS[mets[d.index]?.compartment] ?? FALLBACK;
  const tooltip = document.getElementById('tooltip');

  const deltaMap = {};
  if (fluxMode) for (const ch of chords) {
    const key = `${ch.source.index}-${ch.target.index}`;
    deltaMap[key] = ribbonDelta([...(rxnIds[key]??[]), ...(rxnIds[`${ch.target.index}-${ch.source.index}`]??[])]);
  }

  const group = g.append('g').attr('class','group').selectAll('g').data(chords.groups).join('g');
  group.append('path')
    .attr('fill', compColor).attr('stroke', d=>d3.rgb(compColor(d)).darker(0.5)).attr('d', arc)
    .on('mouseover', (event,d) => {
      const m = mets[d.index];
      tooltip.style.display='block';
      tooltip.innerHTML = `<strong>${m.name||m.id}</strong><br>BiGG: ${m.id}<br>
        Compartment: ${COMP_NAMES[m.compartment]??m.compartment}
        ${m.formula?`<br>Formula: ${m.formula}`:''}<br>Charge: ${m.charge}`;
      g.selectAll('.ribbons path').style('opacity', rd =>
        rd.source.index===d.index||rd.target.index===d.index ? 1 : 0.06);
    })
    .on('mousemove', e => { tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-12)+'px'; })
    .on('mouseout', () => { tooltip.style.display='none'; g.selectAll('.ribbons path').style('opacity', fluxMode?0.85:0.72); });

  const lsz = N>50?'7px':N>35?'8.5px':N>20?'10px':'11.5px';
  group.append('text').each(d=>{d.angle=(d.startAngle+d.endAngle)/2;})
    .attr('dy','0.35em')
    .attr('transform', d=>`rotate(${d.angle*180/Math.PI-90}) translate(${outerR+7}) ${d.angle>Math.PI?'rotate(180)':''}`)
    .attr('text-anchor', d=>d.angle>Math.PI?'end':'start')
    .attr('fill','#94a3b8').attr('font-size',lsz)
    .text(d=>{ const nm=mets[d.index]?.name||mets[d.index]?.id||''; const ml=N>35?18:24; return nm.length>ml?nm.slice(0,ml-1)+'…':nm; });

  g.append('g').attr('class','ribbons').selectAll('path').data(chords).join('path')
    .attr('d', ribbon)
    .attr('fill', d => {
      if (!fluxMode) return compColor(chords.groups[d.source.index]);
      return fluxColor(deltaMap[`${d.source.index}-${d.target.index}`]);
    })
    .attr('stroke', d => {
      const c = fluxMode ? fluxColor(deltaMap[`${d.source.index}-${d.target.index}`]) : compColor(chords.groups[d.source.index]);
      return d3.rgb(c).darker(0.5);
    })
    .style('opacity', fluxMode?0.85:0.72)
    .on('mouseover', (event,d) => {
      const key = `${d.source.index}-${d.target.index}`;
      const rxns = rxnNames[key] ?? rxnNames[`${d.target.index}-${d.source.index}`] ?? [];
      const delta = deltaMap[key];
      tooltip.style.display='block';
      tooltip.innerHTML = `
        <strong>${mets[d.source.index]?.name}</strong> → <strong>${mets[d.target.index]?.name}</strong><br>
        ${rxns.length} reaction${rxns.length!==1?'s':''}
        <div class="sub">${rxns.slice(0,5).join(', ')}${rxns.length>5?` +${rxns.length-5} more`:''}</div>
        ${inFluxMode() ? fluxLabel(delta) : ''}`;
      d3.select(event.currentTarget).style('opacity',1);
    })
    .on('mousemove', e=>{tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-12)+'px';})
    .on('mouseout', (event)=>{tooltip.style.display='none';d3.select(event.currentTarget).style('opacity',fluxMode?0.85:0.72);});

  chart.appendChild(svg.node());
}

// ── Escher Flux Map — rendered via the official Escher library ─────────────────

const ESCHER_MAP_PATHS = {
  'central_metabolism':          './data/escher_maps/central_metabolism.json',
  'fatty_acid_beta_oxidation':   './data/escher_maps/fatty_acid_beta_oxidation.json',
  'fatty_acid_biosynthesis':     './data/escher_maps/fatty_acid_biosynthesis.json',
  'nucleotide_metabolism':       './data/escher_maps/nucleotide_metabolism.json',
  'nucleotide_histidine_biosyn': './data/escher_maps/nucleotide_histidine_biosyn.json',
};

async function renderEscher() {
  const chart  = document.getElementById('chart');
  const mapKey = document.getElementById('sel-escher-map').value;

  if (!escherMapCache[mapKey]) {
    chart.innerHTML = '<div id="status">Loading map…</div>';
    try {
      const raw = await fetch(ESCHER_MAP_PATHS[mapKey]).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      });
      // Store the full [header, mapData] array — that's what escher.Builder expects
      escherMapCache[mapKey] = raw;
    } catch (e) {
      chart.innerHTML = `<div id="status">Failed to load map: ${e.message}</div>`;
      return;
    }
  }

  if (typeof escher === 'undefined') {
    chart.innerHTML = '<div id="status">Escher library not loaded — check network connection.</div>';
    return;
  }

  chart.innerHTML = '<div id="escher-container"></div>';

  try {
    escherBuilder = escher.Builder(
      escherMapCache[mapKey],                       // full [header, data] array
      null,                                         // no model overlay
      null,                                         // use built-in CSS
      escher.libs.d3_select('#escher-container'),   // must use Escher's own bundled d3
      {
        // viewer mode
        menu: 'zoom',
        scroll_behavior: 'zoom',
        enable_editing: false,
        full_screen_button: false,
        fill_screen: true,                          // fill the container
        // identifiers
        identifiers_on_map: 'bigg_id',
        // reaction appearance
        reaction_no_data_color: '#bbbbbb',
        reaction_no_data_size: 8,
        // colour scale: negative delta = more active (red), positive = less active (blue)
        reaction_scale: [
          { type: 'min',   color: '#ef4444', size: 20 },
          { type: 'value', value: 0, color: '#94a3b8', size: 8 },
          { type: 'max',   color: '#3b82f6', size: 20 },
        ],
        reaction_styles: ['color', 'size', 'text'],
        // metabolite appearance
        metabolite_no_data_color: '#bbbbbb',
        metabolite_no_data_size: 6,
        metabolite_scale: [
          { type: 'min',   color: '#ef4444', size: 14 },
          { type: 'value', value: 0, color: '#94a3b8', size: 6 },
          { type: 'max',   color: '#3b82f6', size: 14 },
        ],
        metabolite_styles: ['color', 'size'],
      }
    );
    // Builder loads the map asynchronously; defer data application one tick
    if (inFluxMode()) setTimeout(() => updateEscherData(), 0);
  } catch (e) {
    chart.innerHTML = `<div id="status">Escher render error: ${e.message}</div>`;
    console.error(e);
  }
}

function updateEscherData() {
  if (!escherBuilder || !inFluxMode()) return;

  const condition = activeCondition();
  const thresh    = fluxThreshold();
  const layer     = document.getElementById('sel-escher-layer').value;

  // Base: reaction delta scores for the selected condition vs glucose baseline
  const rxnDeltas = {};
  for (const [rxnId, scores] of Object.entries(keio.reaction_scores)) {
    const sc = scores[condition], sb = scores[keio.baseline];
    if (sc != null && sb != null) rxnDeltas[rxnId] = sc - sb;
  }

  if (layer === 'fluxome') {
    // ── Fluxome: colour reaction lines directly by flux delta ──────────────────
    const data = {};
    for (const [id, d] of Object.entries(rxnDeltas))
      if (Math.abs(d) >= thresh) data[id] = d;
    escherBuilder.set_reaction_data(Object.keys(data).length ? data : null);
    escherBuilder.set_metabolite_data(null);

  } else if (layer === 'gene') {
    // ── Gene Activity: aggregate flux deltas → genes (via GPR), then
    //    back-project the gene-level signal onto the reaction lines ────────────
    // Step 1 — gene score: mean reaction delta across everything the gene catalyses
    const geneScores = {};
    for (const [gene, rxns] of Object.entries(gem._geneToRxns)) {
      const ds = rxns.map(r => rxnDeltas[r]).filter(d => d != null);
      if (ds.length) geneScores[gene] = ds.reduce((a, b) => a + b) / ds.length;
    }
    // Step 2 — back-project: each reaction is scored by mean of its gene scores
    const data = {};
    for (const [rxnId, genes] of Object.entries(gem._rxnToGenes)) {
      const gs = genes.map(g => geneScores[g]).filter(s => s != null);
      if (gs.length) {
        const avg = gs.reduce((a, b) => a + b) / gs.length;
        if (Math.abs(avg) >= thresh) data[rxnId] = avg;
      }
    }
    escherBuilder.set_reaction_data(Object.keys(data).length ? data : null);
    escherBuilder.set_metabolite_data(null);

  } else if (layer === 'metabolome') {
    // ── Metabolome: colour metabolite circles by mean flux delta of
    //    all reactions that produce/consume that metabolite ────────────────────
    const data = {};
    for (const [metId, rxns] of Object.entries(gem._metToRxns)) {
      const ds = rxns.map(r => rxnDeltas[r]).filter(d => d != null);
      if (ds.length) {
        const avg = ds.reduce((a, b) => a + b) / ds.length;
        if (Math.abs(avg) >= thresh) data[metId] = avg;
      }
    }
    escherBuilder.set_reaction_data(null);
    escherBuilder.set_metabolite_data(Object.keys(data).length ? data : null);
  }
}

// ── Omics Flow — Alluvial/Sankey across four biological layers ────────────────
function renderAlluvial() {
  const chart = document.getElementById('chart');

  if (!inFluxMode()) {
    chart.innerHTML = '<div id="status">Select a Keio condition above to see the omics flow.</div>';
    return;
  }

  const condition  = activeCondition();
  const thresh     = fluxThreshold();
  const isBaseline = condition === keio.baseline;   // D-Glucose: show absolute, not delta
  const W = chart.clientWidth, H = chart.clientHeight;
  const ML = 170, MR = 170, MT = 62, MB = 24;
  const innerW = W - ML - MR;
  const innerH = H - MT - MB;

  // ── Base scores (absolute when baseline is selected, delta otherwise) ────
  const rxnDeltas = {};
  for (const [id, sc] of Object.entries(keio.reaction_scores)) {
    const a = sc[condition], b = sc[keio.baseline];
    if (a != null) rxnDeltas[id] = isBaseline ? a : (b != null ? a - b : null);
  }

  const geneScores = {};
  for (const [g, rxns] of Object.entries(gem._geneToRxns)) {
    const ds = rxns.map(r => rxnDeltas[r]).filter(d => d != null);
    if (ds.length) geneScores[g] = ds.reduce((a, b) => a + b) / ds.length;
  }

  const metScores = {};
  for (const [m, rxns] of Object.entries(gem._metToRxns)) {
    const ds = rxns.map(r => rxnDeltas[r]).filter(d => d != null);
    if (ds.length) metScores[m] = ds.reduce((a, b) => a + b) / ds.length;
  }

  // ── Aggregate per subsystem ──────────────────────────────────────────────
  const ssMap = {};
  for (const rxn of gem.reactions) {
    const sub = rxn.subsystem;
    if (!sub) continue;
    const s = ssMap[sub] ??= { genes: new Set(), rxns: [], mets: new Set() };
    for (const g of gem._rxnToGenes[rxn.id] ?? []) s.genes.add(g);
    s.rxns.push(rxn.id);
    for (const m of Object.keys(rxn.metabolites ?? {})) s.mets.add(m);
  }

  const items = [];
  for (const [sub, { genes, rxns, mets }] of Object.entries(ssMap)) {
    if (genes.size < 2) continue;
    const gd = [...genes].map(g => geneScores[g]).filter(d => d != null);
    const rd = rxns.map(r => rxnDeltas[r]).filter(d => d != null);
    const md = [...mets].map(m => metScores[m]).filter(d => d != null);
    const avg = xs => xs.length ? xs.reduce((a, b) => a + b) / xs.length : 0;
    const gMean = avg(gd), rMean = avg(rd), mMean = avg(md);
    const activity = (Math.abs(gMean) + Math.abs(rMean) + Math.abs(mMean)) / 3;
    items.push({
      sub,
      geneCount: genes.size,
      gMean, rMean, mMean, activity,
      // layer scores: genome=structural count, others=|mean delta|
      ls: [genes.size, Math.abs(gMean), Math.abs(rMean), Math.abs(mMean)],
    });
  }

  // Sort by overall activity; take top 20
  items.sort((a, b) => b.activity - a.activity);
  const vis = items.slice(0, 20);

  // ── Normalize each layer column to fill innerH ───────────────────────────
  const N = vis.length, NL = 4;
  const GAP = 3;
  const availH = innerH - GAP * (N - 1);
  const totals = Array.from({ length: NL }, (_, li) => vis.reduce((s, d) => s + d.ls[li], 0));

  // positions[si][li] = {y, h}
  const pos = vis.map(() => Array(NL).fill(null));
  for (let li = 0; li < NL; li++) {
    let y = 0;
    vis.forEach((item, si) => {
      const h = Math.max(1, (item.ls[li] / (totals[li] || 1)) * availH);
      pos[si][li] = { y, h };
      y += h + GAP;
    });
  }

  // ── Colours ──────────────────────────────────────────────────────────────
  // Each subsystem gets a unique hue; block tint shows delta direction
  const subHue = {};
  vis.forEach((item, i) => { subHue[item.sub] = Math.round((i / vis.length) * 340); });

  function bandColor(item) {
    return `hsl(${subHue[item.sub]},60%,52%)`;
  }
  function blockFill(item, li) {
    if (li === 0 || isBaseline) return `hsl(${subHue[item.sub]},55%,48%)`; // identity colour
    const delta = [null, item.gMean, item.rMean, item.mMean][li];
    if (Math.abs(delta) < thresh) return '#334155';
    const t = Math.min(Math.abs(delta) / 2, 1);
    return delta < 0
      ? d3.interpolateRgb('#334155', '#ef4444')(t)   // more active → red
      : d3.interpolateRgb('#334155', '#3b82f6')(t);  // less active → blue
  }

  // ── Layout constants ─────────────────────────────────────────────────────
  const COL_W = 20;
  // Spread 4 columns evenly across innerW, centred on their midpoint
  const colXs = [0, 1, 2, 3].map(i => ML + i * (innerW / 3));
  const LABELS  = ['GENOME', 'TRANSCRIPTOME', 'PROTEOME', 'METABOLOME'];
  const SUBLBLS = isBaseline
    ? ['gene count', 'gene activity (abs)', 'reaction flux (abs)', 'metabolite flux (abs)']
    : ['gene count', 'gene activity Δ', 'reaction flux Δ', 'metabolite flux Δ'];

  // ── SVG ──────────────────────────────────────────────────────────────────
  const svg = d3.create('svg').attr('width', W).attr('height', H);
  const g   = svg.append('g').attr('transform', `translate(0,${MT})`);

  // Column headers
  LABELS.forEach((lbl, li) => {
    g.append('text')
      .attr('x', colXs[li] + COL_W / 2).attr('y', -36)
      .attr('text-anchor', 'middle').attr('fill', '#e2e8f0')
      .attr('font-size', '10.5px').attr('font-weight', '700').attr('letter-spacing', '0.09em')
      .text(lbl);
    g.append('text')
      .attr('x', colXs[li] + COL_W / 2).attr('y', -20)
      .attr('text-anchor', 'middle').attr('fill', '#475569').attr('font-size', '8.5px')
      .text(SUBLBLS[li]);
    // Vertical axis line
    g.append('line')
      .attr('x1', colXs[li] + COL_W / 2).attr('y1', -8)
      .attr('x2', colXs[li] + COL_W / 2).attr('y2', innerH)
      .attr('stroke', '#1e2533').attr('stroke-width', 1);
  });

  // Ribbons between adjacent columns (draw under blocks)
  const rG = g.append('g');
  for (let li = 0; li < 3; li++) {
    const x1 = colXs[li] + COL_W, x2 = colXs[li + 1];
    const mx = (x1 + x2) / 2;
    vis.forEach((item, si) => {
      const s = pos[si][li], t = pos[si][li + 1];
      rG.append('path')
        .attr('d', `M${x1},${s.y} C${mx},${s.y} ${mx},${t.y} ${x2},${t.y}
                    L${x2},${t.y+t.h} C${mx},${t.y+t.h} ${mx},${s.y+s.h} ${x1},${s.y+s.h} Z`)
        .attr('fill', bandColor(item))
        .attr('opacity', 0.18);
    });
  }

  // Blocks + labels + tooltips
  const tooltip = document.getElementById('tooltip');
  vis.forEach((item, si) => {
    for (let li = 0; li < NL; li++) {
      const { y, h } = pos[si][li];
      g.append('rect')
        .attr('x', colXs[li]).attr('y', y)
        .attr('width', COL_W).attr('height', Math.max(1, h))
        .attr('fill', blockFill(item, li)).attr('rx', 2).attr('cursor', 'pointer')
        .on('mouseover', event => {
          const lbl = isBaseline ? '' : 'Δ ';
          const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(3);
          tooltip.style.display = 'block';
          tooltip.innerHTML = `<strong>${item.sub}</strong>
            <div class="sub">${item.geneCount} genes${isBaseline ? ' — absolute flux' : ''}</div>
            Gene&thinsp;${lbl}${fmt(item.gMean)}<br>
            Rxn&thinsp;${lbl}&nbsp;&nbsp;${fmt(item.rMean)}<br>
            Met&thinsp;${lbl}&nbsp;&nbsp;${fmt(item.mMean)}`;
        })
        .on('mousemove', e => { tooltip.style.left = (e.clientX+14)+'px'; tooltip.style.top = (e.clientY-12)+'px'; })
        .on('mouseout',  () => { tooltip.style.display = 'none'; });
    }

    // Left-side label (anchored to genome column)
    const lp = pos[si][0];
    if (lp.h >= 5) {
      g.append('text')
        .attr('x', colXs[0] - 6).attr('y', lp.y + lp.h / 2 + 3.5)
        .attr('text-anchor', 'end').attr('fill', '#94a3b8').attr('font-size', '9.5px')
        .text(item.sub.length > 30 ? item.sub.slice(0, 29) + '…' : item.sub);
    }

    // Right-side label (anchored to metabolome column)
    const rp = pos[si][3];
    if (rp.h >= 5) {
      g.append('text')
        .attr('x', colXs[3] + COL_W + 6).attr('y', rp.y + rp.h / 2 + 3.5)
        .attr('text-anchor', 'start').attr('fill', '#94a3b8').attr('font-size', '9.5px')
        .text(item.sub.length > 30 ? item.sub.slice(0, 29) + '…' : item.sub);
    }
  });

  chart.appendChild(svg.node());
}

init();
